name: IPL 2026 Pipeline

on:
  schedule:
    - cron: "0 18 * * *"         # nightly pipeline
    - cron: "*/5 13-15 * * 1-5"  # weekdays toss window
    - cron: "*/5 9-15 * * 0,6"   # weekends toss window

  workflow_dispatch:

jobs:

  update_results:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Download existing artifacts ─────────────────────────
      - name: Download existing artifacts
        run: |
          curl -f -L -o artifacts.zip \
            https://github.com/mohdfahad20/IPL-2026-Live-Prediction/releases/download/latest-data/artifacts.zip \
            || echo "No existing release found"

          if [ -f artifacts.zip ]; then
            unzip -o artifacts.zip
            rm artifacts.zip
            echo "Artifacts extracted"
          else
            echo "No artifacts to extract"
          fi

      # ── Initialize DB if missing ────────────────────────────
      - name: Initialize DB if missing
        run: |
          if [ ! -f "ipl.db" ]; then
            echo "Creating DB from base dataset"
            python data/load_kaggle_data.py
          else
            echo "DB exists"
          fi

      # ── PIPELINE ────────────────────────────────────────────
      - name: Scrape matches
        run: python scraper/scrapper_data.py --db ipl.db

      - name: Scrape standings
        run: python scrape_standings.py

      - name: Feature engineering
        run: python features/features.py --db ipl.db

      - name: Train model
        run: python model/train.py --db ipl.db

      - name: Run simulation
        run: python -m simulate.simulate --db ipl.db --n 10000

      - name: Log results
        run: python logger.py --db ipl.db

      # ── PACKAGE ARTIFACTS ───────────────────────────────────
      - name: Package artifacts
        run: |
          zip -r artifacts.zip ipl.db models/
          echo "Artifact size:"
          du -sh artifacts.zip

      # ── UPLOAD TO RELEASE ───────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-data
          name: "Latest IPL Data"
          files: artifacts.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── TRIGGER RENDER ──────────────────────────────────────
      - name: Trigger Render redeploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
            echo "Render redeploy triggered"
          else
            echo "No deploy hook set"
          fi

      # ── COMMIT LIGHT FILES ONLY ─────────────────────────────
      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add toss_predictions.csv winner_log.csv match_predictions_log.csv || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto update: logs [$(date -u)]"
            git push
          fi


  toss_prediction:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule != '0 18 * * *'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Download artifacts ──────────────────────────────────
      - name: Download existing artifacts
        run: |
          curl -L -o artifacts.zip \
            https://github.com/mohdfahad20/IPL-2026-Live-Prediction/releases/download/latest-data/artifacts.zip \
            || echo "No artifacts found"

          if [ -f artifacts.zip ]; then
            unzip -o artifacts.zip
            rm artifacts.zip
          fi

      # ── Initialize DB if needed ─────────────────────────────
      - name: Initialize DB if missing
        run: |
          if [ ! -f "ipl.db" ]; then
            python data/load_kaggle_data.py
          fi

      - name: Run toss predictor
        run: python toss_scraper.py --db ipl.db

      # ── Commit toss logs ────────────────────────────────────
      - name: Commit toss updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add toss_predictions.csv || true

          if git diff --cached --quiet; then
            echo "No updates"
          else
            git commit -m "auto update: toss [$(date -u)]"
            git push
          fi