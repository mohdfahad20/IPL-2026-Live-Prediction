name: IPL 2026 Pipeline

on:
  schedule:
    - cron: "0 18 * * *"
    - cron: "30 13 * * 1-5"
    - cron: "45 9 * * 0,6"
    - cron: "30 13 * * 0,6"

  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "all"
        type: choice
        options: [all, results, toss]

jobs:

  update_results:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'results')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 18 * * *')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ───── YOUR EXISTING PIPELINE ─────
      - name: Scrape 2026 match results
        run: python scraper/scrapper_data.py --db ipl.db

      - name: Scrape IPL standings
        run: python scrape_standings.py

      - name: Rebuild features
        run: python features/features.py --db ipl.db

      - name: Retrain model
        run: python model/train.py --db ipl.db

      - name: Run simulation
        run: python -m simulate.simulate --db ipl.db --n 10000

      - name: Log predictions
        run: python logger.py --db ipl.db

      # ───── NEW STEP (CRITICAL) ─────
      - name: Export lightweight data
        run: python export_data.py

      # ───── PUSH TO GITHUB ─────
      - name: Commit backend updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add standings.json probabilities.json toss_predictions.csv || true

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      # ───── PUSH TO HUGGING FACE ─────
      - name: Push to Hugging Face
        run: |
          git remote add hf https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/VeNoM21/ipl-2026-live-predictor

          git push hf main --force


  toss_prediction:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'toss')) ||
      (github.event_name == 'schedule' && github.event.schedule != '0 18 * * *')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run toss predictor
        run: python toss_scraper.py --db ipl.db

      # ───── EXPORT AGAIN ─────
      - name: Export lightweight data
        run: python export_data.py

      - name: Commit toss log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add toss_predictions.csv standings.json probabilities.json || true

          if git diff --cached --quiet; then
            echo "No toss data today."
          else
            git commit -m "toss update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Push to Hugging Face
        run: |
          git remote add hf https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/VeNoM21/ipl-2026-live-predictor

          git push hf main --force