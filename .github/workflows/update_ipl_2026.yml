# .github/workflows/update_ipl_2026.yml
#
# Two jobs:
#
# 1. update_results (nightly)
#    Runs at 11:30 PM IST every day — scrapes completed match results,
#    rebuilds features, retrains model, runs simulation, logs predictions.
#
# 2. toss_prediction (match-day toss times)
#    Weekdays (Mon-Fri): 1:30 PM UTC = 7:00 PM IST
#    Weekends (Sat-Sun): 9:45 AM UTC = 3:15 PM IST  (afternoon match)
#                        1:30 PM UTC = 7:00 PM IST  (evening match)

name: IPL 2026 Pipeline

on:
  schedule:
    - cron: "0 18 * * *"       # nightly results: 11:30 PM IST
    - cron: "30 13 * * 1-5"    # weekday evening toss: 7:00 PM IST
    - cron: "45 9 * * 0,6"     # weekend afternoon toss: 3:15 PM IST
    - cron: "30 13 * * 0,6"    # weekend evening toss: 7:00 PM IST

  workflow_dispatch:
    inputs:
      job:
        description: "Which job to run"
        required: false
        default: "all"
        type: choice
        options: [all, results, toss]

jobs:

  update_results:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'results')) ||
      (github.event_name == 'schedule' && github.event.schedule == '0 18 * * *')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape 2026 match results
        run: python scraper/scraper_2026.py --db ipl.db

      - name: Scrape IPL standings (real NRR)
        run: python scrape_standings.py

      - name: Rebuild features
        run: python features/features.py --db ipl.db

      - name: Retrain ensemble model
        run: python model/train.py --db ipl.db

      - name: Run Monte Carlo simulation
        run: python -m simulate.simulate --db ipl.db --n 10000

      - name: Log predictions
        run: python logger.py --db ipl.db

      - name: Commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ipl.db winner_log.csv match_predictions_log.csv || true
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: nightly update [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

  toss_prediction:
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'toss')) ||
      (github.event_name == 'schedule' && github.event.schedule != '0 18 * * *')

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run toss predictor
        run: python toss_scraper.py --db ipl.db

      - name: Commit toss log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toss_predictions.csv || true
          if git diff --cached --quiet; then
            echo "No toss data today."
          else
            git commit -m "toss: live prediction [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi