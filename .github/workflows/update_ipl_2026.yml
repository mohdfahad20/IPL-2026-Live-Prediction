name: IPL 2026 Pipeline

on:
  schedule:
    - cron: "0 18 * * *"
    - cron: "*/5 13-15 * * 1-5"
    - cron: "*/5 9-15 * * 0,6"

  workflow_dispatch:

jobs:

  update_results:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18 * * *'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Download previous artifacts ─────────────────────────
      - name: Download existing artifacts
        run: |
          curl -f -L -o artifacts.zip \
            https://github.com/mohdfahad20/IPL-2026-Live-Prediction/releases/download/latest-data/artifacts.zip \
            || echo "No existing release found"

          if [ -f artifacts.zip ]; then
            unzip -o artifacts.zip
            rm artifacts.zip
          fi

      # ── Dataset Download ────────────────────────────────────
      - name: Install gdown
        run: pip install gdown

      - name: Download dataset
        run: |
          mkdir -p data
          gdown https://drive.google.com/uc?id=1i0fgnUjKEwQuGyMEfZq0JC26A8ZcEKAZ -O data/IPL.csv

      - name: Verify dataset
        run: |
          if [ ! -s "data/IPL.csv" ]; then
            echo "Dataset download failed"
            exit 1
          fi
          ls -lh data/IPL.csv

      # ── Initialize DB ───────────────────────────────────────
      - name: Initialize DB if missing
        run: |
          if [ ! -f "ipl.db" ]; then
            python data/load_kaggle_data.py --csv data/IPL.csv --db ipl.db
          fi

      # ── PIPELINE ────────────────────────────────────────────
      - name: Scrape matches
        run: python scraper/scrapper_data.py --db ipl.db

      - name: Scrape standings
        run: python scrape_standings.py

      - name: Feature engineering
        run: python features/features.py --db ipl.db

      - name: Train model
        run: python model/train.py --db ipl.db

      - name: Run simulation
        run: python -m simulate.simulate --db ipl.db --n 10000

      - name: Log results
        run: python logger.py --db ipl.db

      # ── Package artifacts ───────────────────────────────────
      - name: Package artifacts
        run: |
          zip -r artifacts.zip ipl.db models/
          du -sh artifacts.zip

      # ── Upload release ──────────────────────────────────────
      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-data
          name: "Latest IPL Data"
          files: artifacts.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Trigger Render ──────────────────────────────────────
      - name: Trigger Render redeploy
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          fi

      # ── Commit logs ─────────────────────────────────────────
      - name: Commit logs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add toss_predictions.csv winner_log.csv match_predictions_log.csv || true

          if ! git diff --cached --quiet; then
            git commit -m "auto update: logs [$(date -u)]"
            git push
          fi


  toss_prediction:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule != '0 18 * * *'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Download artifacts ──────────────────────────────────
      - name: Download existing artifacts
        run: |
          curl -f -L -o artifacts.zip \
            https://github.com/mohdfahad20/IPL-2026-Live-Prediction/releases/download/latest-data/artifacts.zip \
            || echo "No artifacts found"

          if [ -f artifacts.zip ]; then
            unzip -o artifacts.zip
            rm artifacts.zip
          fi

      # ── Dataset Download ────────────────────────────────────
      - name: Install gdown
        run: pip install gdown

      - name: Download dataset
        run: |
          mkdir -p data
          gdown --fuzzy https://drive.google.com/uc?id=1i0fgnUjKEwQuGyMEfZq0JC26A8ZcEKAZ -O data/IPL.csv

      - name: Verify dataset
        run: |
          if [ ! -s "data/IPL.csv" ]; then
            echo "Dataset download failed"
            exit 1
          fi

      # ── Initialize DB ───────────────────────────────────────
      - name: Initialize DB if missing
        run: |
          if [ ! -f "ipl.db" ]; then
            python data/load_kaggle_data.py --csv data/IPL.csv --db ipl.db
          fi

      - name: Run toss predictor
        run: python toss_scraper.py --db ipl.db

      # ── Commit toss logs ────────────────────────────────────
      - name: Commit toss updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add toss_predictions.csv || true

          if ! git diff --cached --quiet; then
            git commit -m "auto update: toss [$(date -u)]"
            git push
          fi