name: IPL 2026 Pipeline

# on:
#   schedule:
#     - cron: "0 18 * * *"       # nightly
#     - cron: "30 13 * * 1-5"    # weekday toss
#     - cron: "45 9 * * 0,6"     # weekend afternoon
#     - cron: "30 13 * * 0,6"    # weekend evening

on:
  schedule:
    - cron: "0 18 * * *"       # nightly pipeline

    # 🔥 NEW (toss detection)
    - cron: "*/5 9-19 * * *"      # check toss every 5 minutes

  workflow_dispatch:

jobs:

  update_results:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Ensure DB exists (important for CI)
      - name: Initialize DB if missing
        run: |
          if [ ! -f "ipl.db" ]; then
            echo "DB not found → creating from base dataset"
            python data/load_kaggle_data.py
          else
            echo "DB already exists"
          fi

      # 🔁 PIPELINE (CORRECT ORDER)
      - name: Scrape matches
        run: python scraper/scrapper_data.py --db ipl.db

      - name: Scrape standings
        run: python scrape_standings.py

      - name: Feature engineering
        run: python features/features.py --db ipl.db

      - name: Train model
        run: python model/train.py --db ipl.db

      - name: Run simulation
        run: python -m simulate.simulate --db ipl.db --n 10000

      - name: Log results
        run: python logger.py --db ipl.db

      # ✅ Commit updated DB + logs
      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ipl.db *.csv || true

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "auto update: data + model [$(date -u)]"
            git push
          fi


  toss_prediction:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ✅ Ensure DB exists
      - name: Initialize DB if missing
        run: |
          if [ ! -f "ipl.db" ]; then
            python data/load_kaggle_data.py
          fi

      - name: Run toss predictor
        run: python toss_scraper.py --db ipl.db

      - name: Commit toss updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add toss_predictions.csv ipl.db || true

          if git diff --cached --quiet; then
            echo "No toss updates"
          else
            git commit -m "auto update: toss [$(date -u)]"
            git push
          fi